<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="台股零股與隔日衝分析工具，使用 TWSE 公開資料計算趨勢、價量與風險分數。"
    />
    <title>台股隔日衝分析工具</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-panel" aria-label="分析設定">
        <div class="brand-block">
          <div class="brand-mark">TA</div>
          <div>
            <h1>台股分析</h1>
            <p>零股 / 隔日衝決策台</p>
          </div>
        </div>

        <form id="analysisForm" class="input-stack">
          <label class="field">
            <span>股票代號</span>
            <input id="symbolInput" name="symbol" inputmode="numeric" value="2317" maxlength="6" />
          </label>

          <div class="segmented" role="radiogroup" aria-label="交易模式">
            <label>
              <input type="radio" name="mode" value="overnight" checked />
              <span>隔日衝</span>
            </label>
            <label>
              <input type="radio" name="mode" value="swing" />
              <span>短波段</span>
            </label>
          </div>

          <button class="primary-action" type="submit">
            <span aria-hidden="true">⌕</span>
            分析
          </button>
        </form>

        <section class="market-controls" aria-label="市場情勢">
          <div class="section-head">
            <h2>大環境</h2>
            <button id="refreshMarketButton" type="button">更新美股</button>
          </div>
          <label class="select-field">
            <span>國際情勢</span>
            <select id="globalMood">
              <option value="0">中性</option>
              <option value="6">風險偏多</option>
              <option value="-6">風險偏空</option>
            </select>
          </label>
          <label class="select-field">
            <span>台灣新聞</span>
            <select id="taiwanNewsMood">
              <option value="0">中性</option>
              <option value="6">主線利多</option>
              <option value="-6">利空/監管/地緣風險</option>
            </select>
          </label>
          <label class="field compact-field">
            <span>台股夜盤漲跌 %</span>
            <input id="nightFuturesInput" type="number" value="0" min="-10" max="10" step="0.1" />
          </label>
          <p class="context-status" id="marketContextStatus">美股指數尚未更新</p>
        </section>

        <section class="watchlist" aria-label="快速選股">
          <h2>隔日衝推薦</h2>
          <div class="ticker-list ranked-list" id="tickerList"></div>
        </section>

        <section class="risk-controls" aria-label="風控參數">
          <h2>風控</h2>
          <label class="range-field">
            <span>單筆風險 <b id="riskValue">2.5%</b></span>
            <input id="riskSlider" type="range" min="1" max="5" value="2.5" step="0.5" />
          </label>
          <label class="range-field">
            <span>停利目標 <b id="profitValue">4%</b></span>
            <input id="profitSlider" type="range" min="2" max="8" value="4" step="0.5" />
          </label>
        </section>
      </aside>

      <section class="analysis-board" aria-live="polite">
        <header class="result-header">
          <div>
            <p class="eyebrow" id="marketState">資料時間：示範資料</p>
            <h2 id="stockTitle">2317 鴻海</h2>
          </div>
          <div class="verdict" id="verdictBadge">觀望偏多</div>
        </header>

        <section class="summary-grid">
          <article class="metric-tile">
            <span>總分</span>
            <strong id="totalScore">72</strong>
            <small id="scoreLabel">可追蹤，等尾盤確認</small>
          </article>
          <article class="metric-tile">
            <span>隔日衝</span>
            <strong id="overnightFit">適合</strong>
            <small id="overnightReason">流動性佳，尾盤需站穩</small>
          </article>
          <article class="metric-tile">
            <span>風險</span>
            <strong id="riskLevel">中</strong>
            <small id="riskReason">短線漲幅可控</small>
          </article>
          <article class="metric-tile">
            <span>大環境</span>
            <strong id="marketScoreValue">0</strong>
            <small id="marketScoreReason">中性，不加不減</small>
          </article>
        </section>

        <section class="main-layout">
          <article class="panel score-panel">
            <div class="panel-head">
              <h3>流派分數</h3>
              <span id="modeLabel">隔日衝權重</span>
            </div>
            <div id="scoreRows" class="score-rows"></div>
          </article>

          <article class="panel plan-panel">
            <div class="panel-head">
              <h3>進出場計畫</h3>
              <span id="planStatus">限價執行</span>
            </div>
            <div class="timeline" id="tradePlan"></div>
          </article>
        </section>

        <section class="details-grid">
          <article class="panel">
            <div class="panel-head">
              <h3>買進理由</h3>
              <span>保留</span>
            </div>
            <ul id="buyReasons" class="reason-list"></ul>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h3>風險警訊</h3>
              <span>汰除</span>
            </div>
            <ul id="riskFlags" class="reason-list warning"></ul>
          </article>
          <article class="panel">
            <div class="panel-head">
              <h3>量化回測</h3>
              <span id="backtestStatus">歷史樣本</span>
            </div>
            <div id="backtestSummary" class="backtest-grid"></div>
          </article>
        </section>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
